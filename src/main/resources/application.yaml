spring:
  application:
    name: insta-share

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 60000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

  docker:
    compose:
      enabled: true
      file: compose.yaml

aws:
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET_NAME}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.andrewstsai.instashare: DEBUG
    org.springframework.web: INFO